name: Documentation Protocol

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'README.md'
      - '**/README.md'
      - '**/doc/system/**'
      - '**/doc/*SYSTEM.md'
      - 'docs/canonical/**'
      - 'docs/audits/**'
      - 'scripts/check-documentation-protocol.py'
      - 'scripts/collect-doc-audit-paths.sh'
      - 'scripts/doc-audit'
      - 'scripts/doc-audit.py'
      - 'scripts/doc_registry.py'
      - 'scripts/emit-doc-audit-annotations.py'
      - 'scripts/render-doc-audit-comment.py'
      - '.github/workflows/documentation_protocol.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'README.md'
      - '**/README.md'
      - '**/doc/system/**'
      - '**/doc/*SYSTEM.md'
      - 'docs/canonical/**'
      - 'docs/audits/**'
      - 'scripts/check-documentation-protocol.py'
      - 'scripts/collect-doc-audit-paths.sh'
      - 'scripts/doc-audit'
      - 'scripts/doc-audit.py'
      - 'scripts/doc_registry.py'
      - 'scripts/emit-doc-audit-annotations.py'
      - 'scripts/render-doc-audit-comment.py'
      - '.github/workflows/documentation_protocol.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  doc-audit:
    name: Registry-Driven Documentation Audit
    runs-on: ubuntu-latest
    env:
      DOC_AUDIT_PATHS_FILE: /tmp/doc-audit-paths.txt
      DOC_AUDIT_REPORT_MD: /tmp/doc-audit-report.md
      DOC_AUDIT_REPORT_JSON: /tmp/doc-audit-report.json
      DOC_AUDIT_COMMENT_MD: /tmp/doc-audit-comment.md
      DOC_AUDIT_ARTIFACT_NAME: documentation-audit-${{ github.run_id }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect changed documentation paths
        if: github.event_name != 'workflow_dispatch'
        env:
          DOC_AUDIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          DOC_AUDIT_HEAD_SHA: ${{ github.sha }}
        run: |
          bash scripts/collect-doc-audit-paths.sh \
            --base "${DOC_AUDIT_BASE_SHA}" \
            --head "${DOC_AUDIT_HEAD_SHA}" \
            --output "${DOC_AUDIT_PATHS_FILE}"

      - name: Run documentation audit (changed scope)
        if: github.event_name != 'workflow_dispatch'
        run: |
          bash scripts/doc-audit \
            --strict \
            --run-builds \
            --changed-only \
            --changed-paths-file "${DOC_AUDIT_PATHS_FILE}" \
            --report-out "${DOC_AUDIT_REPORT_MD}" \
            --json-out "${DOC_AUDIT_REPORT_JSON}"

      - name: Run documentation audit (full)
        if: github.event_name == 'workflow_dispatch'
        run: |
          bash scripts/doc-audit \
            --strict \
            --run-builds \
            --report-out "${DOC_AUDIT_REPORT_MD}" \
            --json-out "${DOC_AUDIT_REPORT_JSON}"

      - name: Annotate documentation audit results
        if: always()
        run: |
          python3 scripts/emit-doc-audit-annotations.py \
            --json "${DOC_AUDIT_REPORT_JSON}"

      - name: Render documentation audit PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          python3 scripts/render-doc-audit-comment.py \
            --json "${DOC_AUDIT_REPORT_JSON}" \
            --out "${DOC_AUDIT_COMMENT_MD}" \
            --artifact-name "${DOC_AUDIT_ARTIFACT_NAME}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish documentation audit PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DOC_AUDIT_COMMENT_MD: ${{ env.DOC_AUDIT_COMMENT_MD }}
        with:
          script: |
            const fs = require('fs');
            const commentPath = process.env.DOC_AUDIT_COMMENT_MD;
            const marker = '<!-- doc-audit-comment -->';
            if (!commentPath || !fs.existsSync(commentPath)) {
              core.warning(`Documentation audit comment file not found: ${commentPath || '(unset)'}`);
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              typeof comment.body === 'string' &&
              comment.body.includes(marker) &&
              comment.user &&
              comment.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload documentation audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DOC_AUDIT_ARTIFACT_NAME }}
          path: |
            ${{ env.DOC_AUDIT_REPORT_MD }}
            ${{ env.DOC_AUDIT_REPORT_JSON }}
            ${{ env.DOC_AUDIT_COMMENT_MD }}
            ${{ env.DOC_AUDIT_PATHS_FILE }}
          if-no-files-found: warn
