# Forge Backend Ecosystem - Consolidated Render Deployment
# Database Consolidation Architecture (2 databases):
#   - forge-db: Shared by DataForge (owner) and Rake (consumer)
#   - neuroforge-db: Used by NeuroForge for inference tracking
#
# See: DB_CONSOLIDATION_IMPLEMENTATION_NOTES.md for details

databases:
  # Shared database for DataForge and Rake
  - name: forge-db
    databaseName: forge
    user: forge_user
    plan: free
    postgresMajorVersion: 15
    ipAllowList: []  # Render internal access only

  # Separate database for NeuroForge inference tracking
  - name: neuroforge-db
    databaseName: neuroforge
    user: neuroforge_user
    plan: free
    postgresMajorVersion: 15
    ipAllowList: []

services:
  # DataForge - Knowledge/Data Layer (Database Owner)
  - type: web
    name: dataforge
    runtime: python
    plan: free
    repo: https://github.com/Boswecw/DataForge.git
    branch: master
    rootDir: DataForge
    buildCommand: pip install --upgrade pip && CARGO_HOME=/tmp/cargo pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db
          property: connectionString
      - key: VOYAGE_API_KEY
        sync: false  # Manual entry required
      - key: OPENAI_API_KEY
        sync: false  # Optional, manual entry
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"  # TODO: Restrict in production
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: EMBEDDING_MODEL
        value: voyage-2

  # NeuroForge - AI Orchestration Layer (Separate Database)
  - type: web
    name: neuroforge
    runtime: python
    plan: free
    repo: https://github.com/Boswecw/NeuroForge.git
    branch: master
    rootDir: NeuroForge
    buildCommand: pip install --upgrade pip && CARGO_HOME=/tmp/cargo pip install -r requirements.txt
    startCommand: uvicorn neuroforge_backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: neuroforge-db  # SEPARATE database for inference tracking
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false  # Manual entry required
      - key: ANTHROPIC_API_KEY
        sync: false  # Manual entry required
      - key: ADMIN_API_KEY
        generateValue: true
      - key: DATAFORGE_BASE_URL
        fromService:
          type: web
          name: dataforge
          property: host
      - key: CORS_ORIGINS
        value: "*"  # TODO: Restrict in production
      - key: ENABLE_LOCAL_MODELS
        value: false
      - key: ENABLE_REMOTE_MODELS
        value: true
      - key: MAX_OUTPUT_TOKENS
        value: 4096
      - key: LOG_LEVEL
        value: INFO

  # Rake - Document Ingestion Pipeline (Database Consumer)
  - type: web
    name: rake
    runtime: python
    plan: free
    repo: https://github.com/Boswecw/rake.git
    branch: master
    buildCommand: pip install --upgrade pip && CARGO_HOME=/tmp/cargo pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db  # SHARED with DataForge
          property: connectionString
      - key: DATAFORGE_BASE_URL
        fromService:
          type: web
          name: dataforge
          property: host
      - key: OPENAI_API_KEY
        sync: false  # Manual entry required
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: SCHEDULER_ENABLED
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"  # TODO: Restrict in production

  # ForgeAgents - Agent Orchestration Layer
  - type: web
    name: forgeagents
    runtime: python
    plan: free
    repo: https://github.com/Boswecw/Forge-Agents.git
    branch: master
    buildCommand: pip install --upgrade pip && CARGO_HOME=/tmp/cargo pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATAFORGE_URL
        fromService:
          type: web
          name: dataforge
          property: host
      - key: NEUROFORGE_URL
        fromService:
          type: web
          name: neuroforge
          property: host
      - key: RAKE_URL
        fromService:
          type: web
          name: rake
          property: host
      - key: OPENAI_API_KEY
        sync: false  # Manual entry required
      - key: ANTHROPIC_API_KEY
        sync: false  # Manual entry required
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: anthropic
      - key: OPENAI_ENABLED
        value: true
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-4-turbo-preview
      - key: ANTHROPIC_ENABLED
        value: true
      - key: ANTHROPIC_DEFAULT_MODEL
        value: claude-3-sonnet-20240229
      - key: CORS_ORIGINS
        value: "*"  # TODO: Restrict in production
      - key: LOG_LEVEL
        value: INFO

# Deployment Notes:
# 1. Deploy in this order: DataForge → NeuroForge → Rake → ForgeAgents
# 2. After DataForge deploys, manually run migrations if needed
# 3. Set API keys manually in Render dashboard (OPENAI_API_KEY, ANTHROPIC_API_KEY, VOYAGE_API_KEY)
# 4. Update CORS_ORIGINS to specific domains in production
# 5. Verify health checks: curl https://<service>.onrender.com/health
